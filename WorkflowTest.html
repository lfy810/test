<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow 接口测试</title>
    <script src="js/sweetalert2.all.min.js"></script>
    <script src="js/tailwindcss.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 潮水聚集动画 - 从右到左 */
        @keyframes tide-left {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 潮水动画类 */
        .tide-left {
            animation: tide-left 0.8s ease-out forwards;
        }

        /* 滚动条样式 */
        .scrollbar-container {
            position: fixed;
            right: 10px;
            top: 100px;
            bottom: 80px;
            width: 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
            box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.05);
        }

        .scrollbar-container.show {
            opacity: 1;
        }

        .scrollbar-thumb {
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, #0ea5e9, #0369a1);
            border-radius: 6px;
            position: absolute;
            cursor: grab;
            transition: all 0.2s ease;
            box-shadow: 
                0 2px 8px rgba(14, 165, 233, 0.4),
                0 1px 3px rgba(14, 165, 233, 0.2);
        }

        .scrollbar-thumb:active {
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 
                0 4px 12px rgba(14, 165, 233, 0.6),
                0 2px 6px rgba(14, 165, 233, 0.3);
        }

        .scrollbar-thumb:hover {
            background: linear-gradient(180deg, #38bdf8, #0ea5e9);
            box-shadow: 
                0 3px 10px rgba(14, 165, 233, 0.5),
                0 1px 4px rgba(14, 165, 233, 0.3);
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(180deg, #0ea5e9, #0369a1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s 0.5s;
            z-index: 9998;
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, transform 0.5s ease, visibility 0s;
        }

        .back-to-top:hover {
            background: linear-gradient(180deg, #38bdf8, #0ea5e9);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.6);
            transform: translateX(-50%) translateY(-2px);
        }
    </style>
</head>

<body class="p-8 bg-gray-100">
    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="backToTop" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </div>
    
    <!-- 滚动条 -->
    <div class="scrollbar-container" id="scrollbarContainer">
        <div class="scrollbar-thumb" id="scrollbarThumb"></div>
    </div>
    
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6 tide-left">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Workflow 接口测试</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">API 密钥</label>
                <input type="password" id="apiKey"
                    class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Intention</label>
                <input type="text" id="intention"
                    class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button onclick="submitRequest()"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
                发送请求
            </button>
        </div>

        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-800">响应结果</h2>
            <pre id="responseOutput" class="bg-gray-50 p-4 rounded-md border overflow-x-auto"></pre>
        </div>
    </div>

    <script>
        async function submitRequest() {
            const apiKey = document.getElementById('apiKey').value;
            const intentionInput = document.getElementById('intention');
            const output = document.getElementById('responseOutput');
            const submitBtn = document.querySelector('button');

            // 禁用按钮防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '请求中...';

            if (!apiKey || !intentionInput.value) {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送请求';
                Swal.fire('错误', '请填写所有必填字段', 'error');
                return;
            }

            try {
                output.textContent = '';

                const response = await fetch('http://192.168.43.183/v1/workflows/run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: {
                            intention: intentionInput.value
                        },
                        response_mode: "blocking",
                        user: "abc-123"
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                }
                const result = await response.text();
                const responseData = JSON.parse(result);
                let text=""
                    // 添加是否是string的判断
                    if (typeof responseData.data.outputs.body === 'string') {
                        text= JSON.parse(responseData.data.outputs.body);
                    }else{
                        text =  responseData.data.outputs.body;

                    }

                output.textContent = JSON.stringify(text, null, 2);


            } catch (error) {
                Swal.fire('请求失败', error.message, 'error');
                console.error('Error:', error);
            } finally {
                // 无论成功失败都恢复按钮状态
                const submitBtn = document.querySelector('button');
                submitBtn.disabled = false;
                submitBtn.textContent = '发送请求';
            }
        }

        // 滚动条功能
        let hideScrollbarTimeout;
        let isDragging = false;

        function updateScrollbar() {
            const scrollbarContainer = document.getElementById('scrollbarContainer');
            const scrollbarThumb = document.getElementById('scrollbarThumb');
            
            // 显示滚动条
            scrollbarContainer.classList.add('show');
            
            // 计算滚动进度
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const containerHeight = scrollbarContainer.offsetHeight;
            const thumbHeight = scrollbarThumb.offsetHeight;
            
            // 计算滚动条位置
            const maxThumbPosition = containerHeight - thumbHeight;
            const thumbPosition = (scrollTop / scrollHeight) * maxThumbPosition;
            
            // 更新滚动条位置
            scrollbarThumb.style.transform = `translateY(${thumbPosition}px)`;
            
            // 清除之前的定时器
            clearTimeout(hideScrollbarTimeout);
            
            // 设置延迟隐藏滚动条
            hideScrollbarTimeout = setTimeout(() => {
                if (!isDragging) {
                    scrollbarContainer.classList.remove('show');
                }
            }, 1500);
        }

        // 滚动条拖动功能
        const scrollbarThumb = document.getElementById('scrollbarThumb');
        const scrollbarContainer = document.getElementById('scrollbarContainer');
        let startY, startScrollTop;

        // 鼠标事件处理
        scrollbarThumb.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);

        // 触摸事件处理
        scrollbarThumb.addEventListener('touchstart', handleDragStart, { passive: false });
        document.addEventListener('touchmove', handleDragMove, { passive: false });
        document.addEventListener('touchend', handleDragEnd);

        function handleDragStart(e) {
            isDragging = true;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startY = clientY;
            startScrollTop = window.pageYOffset || document.documentElement.scrollTop;
            e.preventDefault();
        }

        function handleDragMove(e) {
            if (!isDragging) return;
            
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const containerHeight = scrollbarContainer.offsetHeight;
            const thumbHeight = scrollbarThumb.offsetHeight;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const maxThumbPosition = containerHeight - thumbHeight;
            
            const deltaY = clientY - startY;
            const thumbPosition = (startScrollTop / scrollHeight) * maxThumbPosition + deltaY;
            
            // 限制滚动条范围
            const clampedPosition = Math.max(0, Math.min(maxThumbPosition, thumbPosition));
            const targetScrollTop = (clampedPosition / maxThumbPosition) * scrollHeight;
            
            window.scrollTo({
                top: targetScrollTop,
                behavior: 'auto'
            });
            
            e.preventDefault();
        }

        function handleDragEnd() {
            isDragging = false;
        }

        // 滚动条点击事件
        scrollbarContainer.addEventListener('click', (e) => {
            if (e.target === scrollbarThumb) return;
            
            const containerRect = scrollbarContainer.getBoundingClientRect();
            const thumbRect = scrollbarThumb.getBoundingClientRect();
            const clickPosition = e.clientY - containerRect.top;
            
            const containerHeight = containerRect.height;
            const thumbHeight = thumbRect.height;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const maxThumbPosition = containerHeight - thumbHeight;
            
            // 计算目标位置
            let targetThumbPosition;
            if (clickPosition < thumbRect.top - containerRect.top) {
                targetThumbPosition = clickPosition;
            } else {
                targetThumbPosition = clickPosition - thumbHeight;
            }
            
            // 限制范围
            targetThumbPosition = Math.max(0, Math.min(maxThumbPosition, targetThumbPosition));
            const targetScrollTop = (targetThumbPosition / maxThumbPosition) * scrollHeight;
            
            window.scrollTo({
                top: targetScrollTop,
                behavior: 'smooth'
            });
        });

        // 回到顶部功能
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // 滚动页面时更新滚动条和回到顶部按钮
        window.addEventListener('scroll', () => {
            updateScrollbar();
            
            const backToTop = document.getElementById('backToTop');
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
    </script>
</body>

</html>
