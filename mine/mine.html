<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 糖尿病管理助手</title>
    <link rel="stylesheet" href="../css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 60px;
            animation: tide-left 0.8s ease-out;
        }
        
        /* 从右向左聚拢动画 */
        @keyframes tide-left {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* 顶部导航栏 */
        .top-bar {
            background: linear-gradient(135deg, #0369a1, #0ea5e9);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 10px rgba(3, 105, 161, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .page-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        /* 用户信息区域 */
        .user-info {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-bottom: 1px solid #e2e8f0;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 16px;
            border: 3px solid #fff;
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.15);
            animation: ripple 8s ease-in-out infinite;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .user-role {
            font-size: 14px;
            color: #64748b;
        }
        
        /* 菜单列表 */
        .menu-list {
            padding: 20px 0;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .menu-item:hover {
            background: #f8fafc;
            transform: translateX(4px);
        }
        
        .menu-icon {
            width: 24px;
            height: 24px;
            margin-right: 16px;
            color: #0ea5e9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-text {
            flex: 1;
            font-size: 16px;
            color: #374151;
        }
        
        .menu-arrow {
            color: #9ca3af;
            font-size: 16px;
        }
        
        /* 退出按钮 */
        .logout-btn {
            margin: 30px 20px 20px;
            padding: 14px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: calc(100% - 40px);
        }
        
        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        
        /* 呼吸动画 */
        @keyframes ripple {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(14, 165, 233, 0);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                width: 100%;
            }
            
            .user-avatar {
                width: 70px;
                height: 70px;
            }
            
            .user-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="top-bar">
            <button class="back-btn" onclick="handleBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="page-title">个人中心</div>
            <div style="width: 40px;"></div>
        </header>
        
        <!-- 用户信息区域 -->
        <div class="user-info">
            <div class="user-avatar">
                <img src="../img/user.jpg" alt="用户头像">
            </div>
            <div class="user-name">张三</div>
            <div class="user-role">普通用户</div>
        </div>
        
        <!-- 菜单列表 -->
        <div class="menu-list">
            <div class="menu-item" onclick="navigateTo('personal-info')">
                <div class="menu-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="menu-text">个人信息</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <div class="menu-item" onclick="navigateTo('my-plan')">
                <div class="menu-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="menu-text">我的方案</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <div class="menu-item" onclick="navigateTo('my-news')">
                <div class="menu-icon">
                    <i class="fas fa-newspaper"></i>
                </div>
                <div class="menu-text">我的资讯</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <div class="menu-item" onclick="navigateTo('checkin-record')">
                <div class="menu-icon">
                    <i class="fas fa-check-square"></i>
                </div>
                <div class="menu-text">打卡记录</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <div class="menu-item" onclick="navigateTo('help-center')">
                <div class="menu-icon">
                    <i class="fas fa-question-circle"></i>
                </div>
                <div class="menu-text">帮助中心</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
            
            <!-- 管理员专属菜单 -->
            <div class="menu-item" onclick="navigateTo('ai-management')">
                <div class="menu-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="menu-text">AI智能管理平台</div>
                <div class="menu-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
        </div>
        
        <!-- 退出按钮 -->
        <button class="logout-btn" onclick="handleLogout()">退出登录</button>
    </div>
    
    <script>
        // 用户信息存储改为sessionStorage，浏览器关闭时自动清除
        
        // 返回上一页
        function handleBack() {
            window.history.back();
        }
        
        // 页面导航
        function navigateTo(page) {
            switch(page) {
                case 'personal-info':
                    window.location.href = '../informationGathering.html';
                    break;
                case 'my-plan':
                    alert('我的方案页面开发中...');
                    break;
                case 'my-news':
                    alert('我的资讯页面开发中...');
                    break;
                case 'checkin-record':
                    alert('打卡记录页面开发中...');
                    break;
                case 'help-center':
                    alert('帮助中心页面开发中...');
                    break;
                case 'ai-management':
                    window.location.href = '../aiAdmin.html';
                    break;
            }
        }
        
        // 退出登录
        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                // 清除登录状态
                sessionStorage.removeItem('userInfo');
                // 跳转到登录页面
                window.location.href = '../login.html';
            }
        }
        
        // 检查登录状态
        window.addEventListener('load', function() {
            const userInfo = sessionStorage.getItem('userInfo');
            if (!userInfo) {
                // 如果未登录，跳转到登录页面
                window.location.href = '../login.html';
            } else {
                // 更新用户信息
                const user = JSON.parse(userInfo);
                document.querySelector('.user-name').textContent = user.username || '用户';
                
                // 根据用户名设置用户角色
                if (user.username === 'admin') {
                    document.querySelector('.user-role').textContent = '管理员';
                } else {
                    document.querySelector('.user-role').textContent = '普通用户';
                    // 隐藏AI智能管理平台菜单（仅管理员可见）
                    const aiManagementMenu = document.querySelector('.menu-item[onclick="navigateTo(\'ai-management\')"]');
                    if (aiManagementMenu) {
                        aiManagementMenu.style.display = 'none';
                    }
                }
            }
        });
    </script>
</body>
</html>
